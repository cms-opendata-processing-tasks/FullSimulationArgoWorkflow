apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: simulation-process-
spec:
  entrypoint: cms-full-sim
  serviceAccountName: argo-service-account
  volumes:
    - name: workflow-pvc
      persistentVolumeClaim:
        claimName: workflow-pvc
            
  arguments:
    parameters:
      ### EDIT BELOW: replace the placeholder 'mirastorage' with the name of your object storage
      - name: bucket
        value: mirastorage
      - name: dataName
        value: "multi-storage-testing"
      ### EDIT BELOW: replace the placeholder 'fragments.py' with the file name of your fragment
      - name: fragFileName
        value: "fragments.py"
      ### EDIT BELOW: replace the placeholder '10' with the amount of events you want to process
      - name: totEvents
        value: 15
      ### EDIT BELOW: replace the placeholder '1' with 4 times the amount of nodes on your cluster e.g. 4 times 2 nodes --> nJobs is 8
      - name: nJobs
        value: 4
      ### EDIT BELOW: replace the placeholder '2016' with the year of the run you are simulating
      - name: runYear
        value: "2016"

  templates:
    - name: cms-full-sim
      inputs:
        parameters:
          - name: bucket
          - name: dataName
          - name: fragFileName
          - name: totEvents
          - name: nJobs
          - name: runYear

      dag:
        tasks:
          - name: divide-jobs
            template: divide-jobs-template
            arguments:
              parameters:
                - name: dataName
                  value: "{{inputs.parameters.dataName}}"
                - name: totEvents
                  value: "{{inputs.parameters.totEvents}}"
                - name: nJobs
                  value: "{{inputs.parameters.nJobs}}"

          - name: define-parameters
            template: define-parameters-template
            arguments:
              parameters:
                - name: runYear
                  value: "{{inputs.parameters.runYear}}"

          - name: gen
            dependencies: [divide-jobs, define-parameters]
            template: gen-template
            arguments:
              parameters:
                - name: bucket
                  value: "{{inputs.parameters.bucket}}"
                - name: dataName
                  value: "{{inputs.parameters.dataName}}"
                - name: fragFileName
                  value: "{{inputs.parameters.fragFileName}}"
                - name: jobIndex
                  value: "{{item.jobIndex}}"
                - name: eventsInJob
                  value: "{{item.eventsinjob}}"
                - name: conditionsGenSimReco
                  value: "{{tasks.define-parameters.outputs.parameters.conditionsGenSimReco}}"
                - name: beamspot
                  value: "{{tasks.define-parameters.outputs.parameters.beamspot}}"
            withParam: "{{tasks.divide-jobs.outputs.result}}"

          - name: sim
            dependencies: [gen]
            template: sim-template
            arguments:
              parameters:
                - name: dataName
                  value: "{{inputs.parameters.dataName}}"
                - name: jobIndex
                  value: "{{item.jobIndex}}"
                - name: eventsInJob
                  value: "{{item.eventsinjob}}"
                - name: conditionsGenSimReco
                  value: "{{tasks.define-parameters.outputs.parameters.conditionsGenSimReco}}"
                - name: beamspot
                  value: "{{tasks.define-parameters.outputs.parameters.beamspot}}"
            withParam: "{{tasks.divide-jobs.outputs.result}}"

          - name: pre-digi2raw
            dependencies: [sim]
            template: pre-digi2raw-template
            arguments:
              parameters:
                - name: dataName
                  value: "{{inputs.parameters.dataName}}"

          - name: digi2raw
            dependencies: [pre-digi2raw]
            template: digi2raw-template
            arguments:
              parameters:
                - name: dataName
                  value: "{{inputs.parameters.dataName}}"
                - name: jobIndex
                  value: "{{item.jobIndex}}"
                - name: eventsInJob
                  value: "{{item.eventsinjob}}"
                - name: conditionsDigiPatNano
                  value: "{{tasks.define-parameters.outputs.parameters.conditionsDigiPatNano}}"
            withParam: "{{tasks.divide-jobs.outputs.result}}"

          - name: hlt
            dependencies: [digi2raw]
            template: hlt-template
            arguments:
              parameters:
                - name: dataName
                  value: "{{inputs.parameters.dataName}}"
                - name: jobIndex
                  value: "{{item.jobIndex}}"
                - name: eventsInJob
                  value: "{{item.eventsinjob}}"
                - name: conditionsHLT
                  value: "{{tasks.define-parameters.outputs.parameters.conditionsHLT}}"
            withParam: "{{tasks.divide-jobs.outputs.result}}"

          - name: reco
            dependencies: [hlt]
            template: reco-template
            arguments:
              parameters:
                - name: dataName
                  value: "{{inputs.parameters.dataName}}"
                - name: jobIndex
                  value: "{{item.jobIndex}}"
                - name: eventsInJob
                  value: "{{item.eventsinjob}}"
                - name: conditionsGenSimReco
                  value: "{{tasks.define-parameters.outputs.parameters.conditionsGenSimReco}}"
            withParam: "{{tasks.divide-jobs.outputs.result}}"

          - name: pat
            dependencies: [reco]
            template: pat-template
            arguments:
              parameters:  
                - name: dataName
                  value: "{{inputs.parameters.dataName}}"
                - name: jobIndex
                  value: "{{item.jobIndex}}"
                - name: eventsInJob
                  value: "{{item.eventsinjob}}"
                - name: conditionsDigiPatNano
                  value: "{{tasks.define-parameters.outputs.parameters.conditionsDigiPatNano}}"
            withParam: "{{tasks.divide-jobs.outputs.result}}"

          - name: nano
            dependencies: [pat]
            template: nano-template
            arguments:
              parameters:
                - name: bucket
                  value: "{{inputs.parameters.bucket}}"
                - name: dataName
                  value: "{{inputs.parameters.dataName}}"
                - name: jobIndex
                  value: "{{item.jobIndex}}"
                - name: eventsInJob
                  value: "{{item.eventsinjob}}"
                - name: conditionsDigiPatNano
                  value: "{{tasks.define-parameters.outputs.parameters.conditionsDigiPatNano}}"
            withParam: "{{tasks.divide-jobs.outputs.result}}"

          - name: validate-example
            dependencies: [nano]
            template: validate-template
            arguments:
              parameters:
                - name: bucket
                  value: "{{inputs.parameters.bucket}}"
                - name: dataName
                  value: "{{inputs.parameters.dataName}}"

    - name: divide-jobs-template
      inputs:
        parameters:
          - name: dataName
          - name: totEvents
          - name: nJobs
      script:
        image: python:alpine3.6
        command: [python]
        source: |
          import json
          import sys
          def split(a, n):
            k, m = divmod(len(a), n)
            return (a[i*k+min(i, m):(i+1)*k+min(i+1, m)] for i in range(n))
          nJobs = {{inputs.parameters.nJobs}}
          totEvents = {{inputs.parameters.totEvents}}
          modEvents = 0
          eventsInJob = -1
          if totEvents > 0:
            eventsInJob = int(totEvents/nJobs)
            modEvents = totEvents % nJobs
          splits= list(split(range(totEvents),nJobs))
          itlist = [i for i in range(1, nJobs+1)]
          dictlist = []
          for i in itlist:
            adict = { "jobIndex": i,
                      "eventsinjob": eventsInJob}
            if i == nJobs:
              adict = { "jobIndex": i,
                        "eventsinjob": eventsInJob + modEvents}
            dictlist.append(adict)

          json.dump(dictlist, sys.stdout)

    - name: define-parameters-template
      inputs:
        parameters:
          - name: runYear
      outputs:
        parameters:
          - name: conditionsGenSimReco
            valueFrom:
              path: /tmp/params/conditionsGenSimReco
          - name: conditionsDigiPatNano
            valueFrom:
              path: /tmp/params/conditionsDigiPatNano
          - name: conditionsHLT
            valueFrom:
              path: /tmp/params/conditionsHLT
          - name: beamspot
            valueFrom:
              path: /tmp/params/beamspot

      script:
        image: python:3.11-slim
        command: [python]
        source: |
          import json, os

          ALL_CONDS = {"2016": {"conditionsGenSimReco": "106X_mcRun2_asymptotic_v13", "conditionsDigiPatNano": "106X_mcRun2_asymptotic_v17", "conditionsHLT": "80X_mcRun2_asymptotic_2016_TrancheIV_v6", "beamspot": "Realistic25ns13TeV2016Collision"},
            "2015": {"conditionsGenSimReco": "106X_mcRun2_asymptotic_v13", "conditionsDigiPatNano": "106X_mcRun2_asymptotic_v17", "conditionsHLT": "80X_mcRun2_asymptotic_2016_TrancheIV_v6", "beamspot": "Realistic25ns13TeV2016Collision"}
            # Add other years here
          }
          # To-do: 2015 is only a mock runYear in ALL_CONDS, check what are the conds for that year for real

          SELECTED_CONDS = ALL_CONDS.get("{{inputs.parameters.runYear}}")

          if not SELECTED_CONDS:
            raise ValueError(f"Unknown runYear {'{{inputs.parameters.runYear}}'}, please add conditions for this runYear in the step define-parameters")

          os.makedirs("/tmp/params", exist_ok=True)

          for key, value in SELECTED_CONDS.items():
            with open(f"/tmp/params/{key}", "w") as tmp_file:
              tmp_file.write(str(value))

    - name: gen-template
      inputs:
        parameters:
          - name: bucket
          - name: dataName
          - name: fragFileName
          - name: jobIndex
          - name: eventsInJob
          - name: conditionsGenSimReco
          - name: beamspot
        
        artifacts:
          - name: GEN-config
            path: /code/CMSSW_10_6_30/src/Configuration/GenProduction/python/fragments.py # path for file in container
            archive:
              none: {}
            s3:
              endpoint: s3.pub1.infomaniak.cloud
              bucket: "{{inputs.parameters.bucket}}"
              region: us-east-1 # placeholder, To-do
              accessKeySecret:
                name: s3-credentials
                key: S3_ACCESS_KEY_ID
              secretKeySecret:
                name: s3-credentials
                key: S3_SECRET_ACCESS_KEY
              insecure: false
              key: FullSim/{{inputs.parameters.dataName}}/{{inputs.parameters.fragFileName}} # path where it stays in the cloud storage
      
      script:
        image: gitlab-registry.cern.ch/cms-cloud/cmssw-docker-opendata/cmssw_10_6_30-slc7_amd64_gcc700
        command: [bash]
        volumeMounts:
          - name: workflow-pvc
            mountPath: /data
        source: |
          # write script here

          # Init first with sudo and then cmsusr
          echo "Initializing cmsenv"
          sudo --preserve-env=CMS_INSTALL_DIR,CMSSW_VERSION,SCRAM_ARCH /opt/cms/entrypoint.sh
          source /opt/cms/entrypoint.sh

          cd /code/CMSSW_10_6_30/src/

          echo "Changing ownership"
          sudo chown -R cmsusr:cmsusr /data
          sudo chown -R cmsusr:cmsusr /code/CMSSW_10_6_30
          echo "Now in" $(pwd)


          mkdir -p Configuration/GenProduction/python
          
          scram b

          # Make a dir where all the different jobs store the .root output files from this step
          # --> this dir is mounted in the cloud storage

          mkdir -p /data/GEN

          PYTHON_FILENAME=/data/GEN/GEN{{inputs.parameters.jobIndex}}_cfg.py
          OUTPUT_FILE=/data/GEN/{{inputs.parameters.jobIndex}}.root
          EVENTS={{inputs.parameters.eventsInJob}}

          CONDITIONS={{inputs.parameters.conditionsGenSimReco}} # 106X_mcRun2_asymptotic_v13
          BEAMSPOT={{inputs.parameters.beamspot}} # Realistic25ns13TeV2016Collision

          
          cmsDriver.py Configuration/GenProduction/python/fragments.py --python_filename $PYTHON_FILENAME --eventcontent RAWSIM \
          --customise Configuration/DataProcessing/Utils.addMonitoring --datatier GEN --fileout file:$OUTPUT_FILE \
          --conditions $CONDITIONS --beamspot $BEAMSPOT \
          --customise_commands process.source.numberEventsInLuminosityBlock="cms.untracked.uint32(100)" --step GEN \
          --geometry DB:Extended --era Run2_2016 --no_exec --mc -n $EVENTS

          # To-do: find out what to do with the numberEventsInLuminosityBlock ^
          # some datasets have it 100, some have it 2500 or something

          # In the generated python file, find which LHAPDF set is needed
          # To-do: this works if only one LHAPDF set is needed and it is configured exactly like this
          LHAPDF_SET_NAME="$(grep -oP "PDF:pSet=LHAPDF6:\K.*?(?=')" $PYTHON_FILENAME)"
          #LHAPDF_SET_NAME="NNPDF31_nnlo_as_0118"

          cd $LHAPDF_DATA_PATH
          sudo rm -r $LHAPDF_SET_NAME

          echo "in $LHAPDF_DATA_PATH"

          sudo wget 'https://lhapdfsets.web.cern.ch/current/'"${LHAPDF_SET_NAME}"'.tar.gz'
          sudo tar xf "$LHAPDF_SET_NAME"'.tar.gz'
          sudo chown -R cmsinst:cmsinst .
          sudo rm -r "$LHAPDF_SET_NAME"'.tar.gz'

          echo "Did LHAPDF installation"

          cd /code/CMSSW_10_6_30/src/

          # To-do: figure out if reports are necessary and make them jobIndex specific
          REPORT_NAME=/data/GEN/report.xml

          cmsRun -e -j $REPORT_NAME $PYTHON_FILENAME
        
        resources:
          requests:
            cpu: "700m"
            memory: "2Gi"
          limits:
            cpu: "800m"

    - name: sim-template
      inputs:
        parameters:
          - name: dataName
          - name: jobIndex
          - name: eventsInJob
          - name: conditionsGenSimReco
          - name: beamspot

      script:
        image: gitlab-registry.cern.ch/cms-cloud/cmssw-docker-opendata/cmssw_10_6_30-slc7_amd64_gcc700
        command: [bash]
        volumeMounts:
          - name: workflow-pvc
            mountPath: /data
        source: |
          # Init first with sudo and then cmsusr
          echo "Initializing cmsenv"
          sudo --preserve-env=CMS_INSTALL_DIR,CMSSW_VERSION,SCRAM_ARCH /opt/cms/entrypoint.sh
          source /opt/cms/entrypoint.sh

          cd /code/CMSSW_10_6_30/src

          echo "Changing ownership"
          sudo chown -R cmsusr:cmsusr /data
          sudo chown -R cmsusr:cmsusr /code/CMSSW_10_6_30
          echo "Now in" $(pwd)

          scram b

          mkdir -p /data/SIM

          PYTHON_FILENAME=/data/SIM/SIM{{inputs.parameters.jobIndex}}_cfg.py
          OUTPUT_FILE=/data/SIM/{{inputs.parameters.jobIndex}}.root
          INPUT_FILE=/data/GEN/{{inputs.parameters.jobIndex}}.root
          EVENTS={{inputs.parameters.eventsInJob}}

          CONDITIONS={{inputs.parameters.conditionsGenSimReco}} # 106X_mcRun2_asymptotic_v13
          BEAMSPOT={{inputs.parameters.beamspot}} # Realistic25ns13TeV2016Collision

          cmsDriver.py --python_filename $PYTHON_FILENAME --eventcontent RAWSIM \
          --customise Configuration/DataProcessing/Utils.addMonitoring --datatier GEN-SIM \
          --fileout file:$OUTPUT_FILE --conditions $CONDITIONS --beamspot $BEAMSPOT \
          --step SIM --geometry DB:Extended --filein file:$INPUT_FILE --era Run2_2016 --runUnscheduled --no_exec --mc -n $EVENTS

          REPORT_NAME=/data/SIM/report.xml
          cmsRun -e -j $REPORT_NAME $PYTHON_FILENAME

        resources:
          requests:
            cpu: "700m"
            memory: "2Gi"

          
    - name: pre-digi2raw-template
      script:
        image: cernopendata/cernopendata-client
        command: [bash]
        volumeMounts:
          - name: workflow-pvc
            mountPath: /data
        source: |
          sudo chmod a+rwx /data
          cernopendata-client get-file-locations --recid 30595 --protocol xrootd > /data/pileup_file_list.txt

    - name: digi2raw-template
      inputs:
        parameters:
          - name: dataName
          - name: jobIndex
          - name: eventsInJob
          - name: conditionsDigiPatNano

      script:
        image: gitlab-registry.cern.ch/cms-cloud/cmssw-docker-opendata/cmssw_10_6_30-slc7_amd64_gcc700
        command: [bash]
        volumeMounts:
          - name: workflow-pvc
            mountPath: /data
        source: |
          # Init first with sudo and then cmsusr
          echo "Initializing cmsenv"
          sudo --preserve-env=CMS_INSTALL_DIR,CMSSW_VERSION,SCRAM_ARCH /opt/cms/entrypoint.sh
          source /opt/cms/entrypoint.sh

          cd /code/CMSSW_10_6_30/src

          echo "Changing ownership"
          sudo chown -R cmsusr:cmsusr /data
          sudo chown -R cmsusr:cmsusr /code/CMSSW_10_6_30
          echo "Now in" $(pwd)

          scram b          

          mkdir -p /data/DIGIPremix

          # Delete useless GEN step root from block storage
          # to make room for future files

          rm /data/GEN/{{inputs.parameters.jobIndex}}.root # TODO: or use rm -i

          PYTHON_FILENAME=/data/DIGIPremix/DIGIPremix{{inputs.parameters.jobIndex}}_cfg.py
          OUTPUT_FILE=/data/DIGIPremix/{{inputs.parameters.jobIndex}}.root
          INPUT_FILE=/data/SIM/{{inputs.parameters.jobIndex}}.root
          EVENTS={{inputs.parameters.eventsInJob}}

          CONDITIONS={{inputs.parameters.conditionsDigiPatNano}}

          mapfile -n {{inputs.parameters.jobIndex}} SELECTED_PILEUP_FILES < /data/pileup_file_list.txt

          cmsDriver.py --python_filename $PYTHON_FILENAME --eventcontent PREMIXRAW \
          --customise Configuration/DataProcessing/Utils.addMonitoring --datatier GEN-SIM-DIGI \
          --fileout file:$OUTPUT_FILE --pileup_input ${SELECTED_PILEUP_FILES[{{inputs.parameters.jobIndex}} - 1]} \
          --datamix PreMix --procModifiers premix_stage2 --conditions $CONDITIONS --step DIGI,DATAMIX,L1,DIGI2RAW \
          --geometry DB:Extended --filein file:$INPUT_FILE --era Run2_2016 --runUnscheduled --no_exec --mc -n $EVENTS

          REPORT_NAME=/data/DIGIPremix/report.xml
          cmsRun -e -j $REPORT_NAME $PYTHON_FILENAME
        
        resources:
          requests:
            cpu: "700m"
            memory: "2Gi"

    - name: hlt-template
      inputs:
        parameters:
          - name: dataName
          - name: jobIndex
          - name: eventsInJob
          - name: conditionsHLT

      script:
        image: gitlab-registry.cern.ch/cms-cloud/cmssw-docker/cmssw_8_0_33_ul-slc7_amd64_gcc530
        command: [bash]
        volumeMounts:
          - name: workflow-pvc
            mountPath: /data
        source: |
          # Init first with sudo and then cmsusr
          echo "Initializing cmsenv"
          sudo --preserve-env=CMS_INSTALL_DIR,CMSSW_VERSION,SCRAM_ARCH /opt/cms/entrypoint.sh
          source /opt/cms/entrypoint.sh

          cd /code/CMSSW_8_0_33_UL/src

          echo "Changing ownership"
          sudo chown -R cmsusr:cmsusr /data
          sudo chown -R cmsusr:cmsusr /code/CMSSW_8_0_33_UL
          echo "Now in" $(pwd)

          scram b

          mkdir -p /data/HLT

          # Delete old files to make room for future files
          rm /data/SIM/{{inputs.parameters.jobIndex}}.root

          PYTHON_FILENAME=/data/HLT/HLT{{inputs.parameters.jobIndex}}_cfg.py
          OUTPUT_FILE=/data/HLT/{{inputs.parameters.jobIndex}}.root
          INPUT_FILE=/data/DIGIPremix/{{inputs.parameters.jobIndex}}.root
          EVENTS={{inputs.parameters.eventsInJob}}

          CONDITIONS={{inputs.parameters.conditionsHLT}}

          cmsDriver.py --python_filename $PYTHON_FILENAME --eventcontent RAWSIM \
          --outputCommand "keep *_mix_*_*,keep *_genPUProtons_*_*" \
          --customise Configuration/DataProcessing/Utils.addMonitoring --datatier GEN-SIM-RAW \
          --inputCommands "keep *","drop *_*_BMTF_*","drop *PixelFEDChannel*_*_*_*" \
          --fileout file:$OUTPUT_FILE --customise_commands 'process.source.bypassVersionCheck = cms.untracked.bool(True)' \
          --step HLT:25ns15e33_v4 --conditions $CONDITIONS \
          --geometry DB:Extended --filein file:$INPUT_FILE --era Run2_2016 --no_exec --mc -n $EVENTS

          REPORT_NAME=/data/DIGIPremix/report.xml
          cmsRun -e -j $REPORT_NAME $PYTHON_FILENAME
        
        resources:
          requests:
            cpu: "700m"
            memory: "2Gi"

    - name: reco-template
      inputs:
        parameters:
          - name: dataName
          - name: jobIndex
          - name: eventsInJob
          - name: conditionsGenSimReco

      script:
        image: gitlab-registry.cern.ch/cms-cloud/cmssw-docker-opendata/cmssw_10_6_30-slc7_amd64_gcc700
        command: [bash]
        volumeMounts:
          - name: workflow-pvc
            mountPath: /data
        source: |
          # Init first with sudo and then cmsusr
          echo "Initializing cmsenv"
          sudo --preserve-env=CMS_INSTALL_DIR,CMSSW_VERSION,SCRAM_ARCH /opt/cms/entrypoint.sh
          source /opt/cms/entrypoint.sh

          cd /code/CMSSW_10_6_30/src

          echo "Changing ownership"
          sudo chown -R cmsusr:cmsusr /data
          sudo chown -R cmsusr:cmsusr /code/CMSSW_10_6_30
          echo "Now in" $(pwd)

          scram b

          mkdir -p /data/RECO

          rm /data/DIGIPremix/{{inputs.parameters.jobIndex}}.root

          PYTHON_FILENAME=/data/RECO/RECO{{inputs.parameters.jobIndex}}_cfg.py
          OUTPUT_FILE=/data/RECO/{{inputs.parameters.jobIndex}}.root
          INPUT_FILE=/data/HLT/{{inputs.parameters.jobIndex}}.root
          EVENTS={{inputs.parameters.eventsInJob}}

          CONDITIONS={{inputs.parameters.conditionsGenSimReco}}

          cmsDriver.py --python_filename $PYTHON_FILENAME --eventcontent AODSIM \
          --customise Configuration/DataProcessing/Utils.addMonitoring --datatier AODSIM --fileout file:$OUTPUT_FILE \
          --conditions $CONDITIONS --step RAW2DIGI,L1Reco,RECO,RECOSIM --geometry DB:Extended \
          --filein file:$INPUT_FILE --era Run2_2016 --runUnscheduled --no_exec --mc -n $EVENTS

          REPORT_NAME=/data/RECO/report.xml

          cmsRun -e -j $REPORT_NAME $PYTHON_FILENAME
        
        resources:
          requests:
            cpu: "700m"
            #memory: "2Gi"

    - name: pat-template
      inputs:
        parameters:
          - name: dataName
          - name: jobIndex
          - name: eventsInJob
          - name: conditionsDigiPatNano

      script:
        image: gitlab-registry.cern.ch/cms-cloud/cmssw-docker-opendata/cmssw_10_6_30-slc7_amd64_gcc700
        command: [bash]
        volumeMounts:
          - name: workflow-pvc
            mountPath: /data
        source: |
          # Init first with sudo and then cmsusr
          echo "Initializing cmsenv"
          sudo --preserve-env=CMS_INSTALL_DIR,CMSSW_VERSION,SCRAM_ARCH /opt/cms/entrypoint.sh
          source /opt/cms/entrypoint.sh

          cd /code/CMSSW_10_6_30/src

          echo "Changing ownership"
          sudo chown -R cmsusr:cmsusr /data
          sudo chown -R cmsusr:cmsusr /code/CMSSW_10_6_30
          echo "Now in" $(pwd)

          scram b

          mkdir -p /data/PAT

          rm /data/HLT/{{inputs.parameters.jobIndex}}.root

          PYTHON_FILENAME=/data/PAT/PAT{{inputs.parameters.jobIndex}}_cfg.py
          OUTPUT_FILE=/data/PAT/{{inputs.parameters.jobIndex}}.root
          INPUT_FILE=/data/RECO/{{inputs.parameters.jobIndex}}.root
          EVENTS={{inputs.parameters.eventsInJob}}

          CONDITIONS={{inputs.parameters.conditionsDigiPatNano}}

          cmsDriver.py --python_filename $PYTHON_FILENAME --eventcontent MINIAODSIM \
          --customise Configuration/DataProcessing/Utils.addMonitoring --datatier MINIAODSIM --fileout file:$OUTPUT_FILE \
          --conditions $CONDITIONS --step PAT --procModifiers run2_miniAOD_UL --geometry DB:Extended \
          --filein file:$INPUT_FILE --era Run2_2016 --runUnscheduled --no_exec --mc -n $EVENTS

          REPORT_NAME=/data/PAT/report.xml

          cmsRun -e -j $REPORT_NAME $PYTHON_FILENAME
        
        resources:
          requests:
            cpu: "700m"
            memory: "2Gi"

    - name: nano-template
      inputs:
        parameters:
          - name: bucket
          - name: dataName
          - name: jobIndex
          - name: eventsInJob
          - name: conditionsDigiPatNano
      
      outputs:
        artifacts:
          - name: NANO-root
            path: /output/NANO/{{inputs.parameters.jobIndex}}.root
            archive:
              none: {}
            s3:
              endpoint: s3.pub1.infomaniak.cloud
              bucket: "{{inputs.parameters.bucket}}"
              region: us-east-1
              accessKeySecret:
                name: s3-credentials
                key: S3_ACCESS_KEY_ID
              secretKeySecret:
                name: s3-credentials
                key: S3_SECRET_ACCESS_KEY
              insecure: false
              key: FullSim/{{inputs.parameters.dataName}}/NANO/{{inputs.parameters.jobIndex}}.root

      script:
        image: gitlab-registry.cern.ch/cms-cloud/cmssw-docker-opendata/cmssw_10_6_30-slc7_amd64_gcc700
        command: [bash]
        volumeMounts:
          - name: workflow-pvc
            mountPath: /data
        source: |
          # Init first with sudo and then cmsusr
          echo "Initializing cmsenv"
          sudo --preserve-env=CMS_INSTALL_DIR,CMSSW_VERSION,SCRAM_ARCH /opt/cms/entrypoint.sh
          source /opt/cms/entrypoint.sh

          cd /code/CMSSW_10_6_30/src

          echo "Changing ownership"
          sudo chown -R cmsusr:cmsusr /data
          sudo chown -R cmsusr:cmsusr /code/CMSSW_10_6_30
          echo "Now in" $(pwd)

          scram b

          sudo mkdir -p /output/NANO
          sudo chown -R cmsusr:cmsusr /output/NANO

          rm /data/RECO/{{inputs.parameters.jobIndex}}.root

          PYTHON_FILENAME=NANO{{inputs.parameters.jobIndex}}_cfg.py
          OUTPUT_FILE=/output/NANO/{{inputs.parameters.jobIndex}}.root
          INPUT_FILE=/data/PAT/{{inputs.parameters.jobIndex}}.root
          EVENTS={{inputs.parameters.eventsInJob}}

          CONDITIONS={{inputs.parameters.conditionsDigiPatNano}}

          cmsDriver.py --python_filename $PYTHON_FILENAME --eventcontent NANOAODSIM \
          --customise Configuration/DataProcessing/Utils.addMonitoring --datatier NANOAODSIM \
          --fileout file:$OUTPUT_FILE --conditions $CONDITIONS --step NANO \
          --filein file:$INPUT_FILE --era Run2_2016,run2_nanoAOD_106Xv2 --no_exec --mc -n $EVENTS

          REPORT_NAME=/output/NANO/report.xml

          cmsRun -e -j $REPORT_NAME $PYTHON_FILENAME
        
        resources:
          requests:
            cpu: "700m"
            memory: "2Gi"

    - name: validate-template
      inputs:
        parameters:
          - name: bucket
          - name: dataName

        artifacts:
          - name: NANO-root
            path: /output/NANO
            archive:
              none: {}
            s3:
              endpoint: s3.pub1.infomaniak.cloud
              bucket: "{{inputs.parameters.bucket}}"
              region: us-east-1
              accessKeySecret:
                name: s3-credentials
                key: S3_ACCESS_KEY_ID
              secretKeySecret:
                name: s3-credentials
                key: S3_SECRET_ACCESS_KEY
              insecure: false
              key: FullSim/{{inputs.parameters.dataName}}/NANO

      outputs:
        artifacts:
          - name: plots
            path: /output/plots
            archive:
              none: {}
            s3:
              endpoint: s3.pub1.infomaniak.cloud
              bucket: "{{inputs.parameters.bucket}}"
              region: us-east-1
              accessKeySecret:
                name: s3-credentials
                key: S3_ACCESS_KEY_ID
              secretKeySecret:
                name: s3-credentials
                key: S3_SECRET_ACCESS_KEY
              insecure: false
              key: FullSim/{{inputs.parameters.dataName}}/plots

      script:
        image: python:3.11-slim
        command: [bash]
        source: |
          import uproot
          import os
          set -e

          pip install --no-cache-dir uproot awkward vector matplotlib

          cd /output
          mkdir -p plots

          cat > analyse.py << 'EOPY'
          import uproot
          import awkward as ak
          import vector
          import matplotlib.pyplot as plt
          import numpy as np

          vector.register_awkward()
          input_file = "NANO/1.root"
          print(f"Loading {input_file}...")

          with uproot.open(input_file) as f:
              tree = f["Events"]
              nElectrons = tree["nElectron"].array()
              pdgId = tree["Electron_pdgId"].array()
              pt = tree["Electron_pt"].array()
              eta = tree["Electron_eta"].array()
              phi = tree["Electron_phi"].array()
              mass = tree["Electron_mass"].array()

              print(f"Loaded {len(nElectrons)} events.")

              nElectrons_np = ak.to_numpy(nElectrons)
              print(f"nElectrons stats: min={nElectrons_np.min()}, max={nElectrons_np.max()}")

              plt.figure(figsize=(8, 5))
              plt.hist(nElectrons_np, bins=120, histtype='step', linewidth=2)
              plt.title("Number of Electrons per Event")
              plt.xlabel("nElectrons")
              plt.ylabel("Events")
              plt.grid(True, alpha=0.3)
              plt.savefig("plots/h_num_cands.png")
              plt.close()

              plt.figure(figsize=(8, 5))
              all_pdg = ak.flatten(pdgId)
              plt.hist(ak.to_numpy(all_pdg), bins=range(-20, 20), histtype='step', linewidth=2)
              plt.title("Type of Electrons (PDG ID)")
              plt.xlabel("PDG ID")
              plt.ylabel("Counts")
              plt.grid(True, alpha=0.3)
              plt.savefig("plots/h_pdgid_cands.png")
              plt.close()

              particles = vector.zip({"pt": pt, "eta": eta, "phi": phi, "mass": mass})
              mu_mask = ((pdgId == 13) | (pdgId == -13)) & (pt > 2.0)
              el_mask = ((pdgId == 11) | (pdgId == -11)) & (pt > 2.0)

              mu_vec = particles[mu_mask]
              mu_id = pdgId[mu_mask]
              el_vec = particles[el_mask]
              el_id = pdgId[el_mask]

              mu_pairs = ak.combinations(mu_vec, 2)
              mu_id_pairs = ak.combinations(mu_id, 2)
              p1_mu, p2_mu = mu_pairs["0"], mu_pairs["1"]
              id1_mu, id2_mu = mu_id_pairs["0"], mu_id_pairs["1"]
              os_mu = (id1_mu * id2_mu) < 0
              dimuon_mass = (p1_mu + p2_mu)[os_mu].mass

              el_pairs = ak.combinations(el_vec, 2)
              el_id_pairs = ak.combinations(el_id, 2)
              p1_el, p2_el = el_pairs["0"], el_pairs["1"]
              id1_el, id2_el = el_id_pairs["0"], el_id_pairs["1"]
              os_el = (id1_el * id2_el) < 0
              dielectron_mass = (p1_el + p2_el)[os_el].mass

              plt.figure(figsize=(8, 6))
              dimuon_flat = ak.flatten(dimuon_mass)
              if len(dimuon_flat) > 0:
                  plt.hist(ak.to_numpy(dimuon_flat), bins=120, range=(0, 120), histtype='step', color='blue', linewidth=2)
              plt.title("Dimuon Invariant Mass")
              plt.xlabel("M_{mumu} (GeV)")
              plt.ylabel("Events")
              plt.grid(True, alpha=0.3)
              plt.savefig("plots/h_dimuon_mass.png")
              plt.close()

              plt.figure(figsize=(8, 6))
              dielectron_flat = ak.flatten(dielectron_mass)
              if len(dielectron_flat) > 0:
                  plt.hist(ak.to_numpy(dielectron_flat), bins=120, range=(0, 120), histtype='step', color='red', linewidth=2)
              plt.title("Dielectron Invariant Mass")
              plt.xlabel("M_{ee} (GeV)")
              plt.ylabel("Events")
              plt.grid(True, alpha=0.3)
              plt.savefig("plots/h_dielectron_mass.png")
              plt.close()
              print("Analysis complete.")
          EOPY

          python3 analyse.py
          ls -l /output/plots
