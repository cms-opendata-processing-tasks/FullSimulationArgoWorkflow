apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: simulation-process-
spec:
  entrypoint: cms-full-sim
  serviceAccountName: argo-service-account

  arguments:
    parameters:
      - name: bucket
        value: mirastorage
      - name: dataName # to-do: better name for this
        value: "BTV-RunIISummer20UL16"
      - name: nPileupFiles
        value: 1
    # to-do: figure out arguments to be more generalized for data-processing

  templates:
    - name: cms-full-sim # to-do: change name
      inputs:
        parameters:
          - name: bucket
          - name: dataName
          - name: nPileupFiles

      dag:
        tasks:
          - name: gen
            template: gen-template
            arguments:
              parameters:
                - name: bucket
                  value: "{{inputs.parameters.bucket}}"
                - name: dataName
                  value: "{{inputs.parameters.dataName}}"
                - name: nPileupFiles
                  value: "{{inputs.parameters.nPileupFiles}}"

          - name: sim
            dependencies: [gen]
            template: sim-template
            arguments:
              parameters:
                - name: bucket
                  value: "{{inputs.parameters.bucket}}"
                - name: dataName
                  value: "{{inputs.parameters.dataName}}"
                - name: nPileupFiles
                  value: "{{inputs.parameters.nPileupFiles}}"

          - name: pre-digi2raw
            dependencies: [sim]
            template: pre-digi2raw-template
            arguments:
              parameters:
                - name: bucket
                  value: "{{inputs.parameters.bucket}}"
                - name: dataName
                  value: "{{inputs.parameters.dataName}}"
                - name: nPileupFiles
                  value: "{{inputs.parameters.nPileupFiles}}"

          - name: digi2raw
            dependencies: [pre-digi2raw]
            template: digi2raw-template
            arguments:
              parameters:
                - name: bucket
                  value: "{{inputs.parameters.bucket}}"
                - name: dataName
                  value: "{{inputs.parameters.dataName}}"
                - name: nPileupFiles
                  value: "{{inputs.parameters.nPileupFiles}}"

          - name: hlt
            dependencies: [digi2raw]
            template: hlt-template
            arguments:
              parameters:
                - name: bucket
                  value: "{{inputs.parameters.bucket}}"
                - name: dataName
                  value: "{{inputs.parameters.dataName}}"

          - name: reco
            dependencies: [hlt]
            template: reco-template
            arguments:
              parameters:
                - name: bucket
                  value: "{{inputs.parameters.bucket}}"
                - name: dataName
                  value: "{{inputs.parameters.dataName}}"
                - name: nPileupFiles
                  value: "{{inputs.parameters.nPileupFiles}}"

          - name: pat
            dependencies: [reco]
            template: pat-template
            arguments:
              parameters:
                - name: bucket
                  value: "{{inputs.parameters.bucket}}"
                - name: dataName
                  value: "{{inputs.parameters.dataName}}"
                - name: nPileupFiles
                  value: "{{inputs.parameters.nPileupFiles}}"

          - name: nano
            dependencies: [pat]
            template: nano-template
            arguments:
              parameters:
                - name: bucket
                  value: "{{inputs.parameters.bucket}}"
                - name: dataName
                  value: "{{inputs.parameters.dataName}}"
                - name: nPileupFiles
                  value: "{{inputs.parameters.nPileupFiles}}"
    - name: gen-template
      inputs:
        parameters:
          - name: bucket
          - name: dataName

        artifacts:
          - name: GEN-config
            path: /code/CMSSW_10_6_30/src/config.py # path for file in container
            archive:
              none: {}
            s3:
              endpoint: s3.pub1.infomaniak.cloud
              bucket: "{{inputs.parameters.bucket}}"
              region: us-east-1 # placeholder, To-do
              accessKeySecret:
                name: s3-credentials
                key: S3_ACCESS_KEY_ID
              secretKeySecret:
                name: s3-credentials
                key: S3_SECRET_ACCESS_KEY
              insecure: false
              key: FullSim/{{inputs.parameters.dataName}}/config.py # path where it stays in the cloud storage

      outputs:
        artifacts:
          - name: GEN-root
            path: /code/CMSSW_10_6_30/src/Simulation/{{inputs.parameters.dataName}}GEN-00010.root
            archive:
              none: {}
            s3:
              endpoint: s3.pub1.infomaniak.cloud
              bucket: "{{inputs.parameters.bucket}}"
              region: us-east-1 # placeholder, To-do
              accessKeySecret:
                name: s3-credentials
                key: S3_ACCESS_KEY_ID
              secretKeySecret:
                name: s3-credentials
                key: S3_SECRET_ACCESS_KEY
              insecure: false
              key: FullSim/{{inputs.parameters.dataName}}/GEN.root # path where it stays in the cloud storage

      script:
        image: gitlab-registry.cern.ch/cms-cloud/cmssw-docker-opendata/cmssw_10_6_30-slc7_amd64_gcc700
        command: [bash]
        source: |
          # write script here

          # Init first with sudo and then cmsusr
          echo "Initializing cmsenv"
          sudo --preserve-env=CMS_INSTALL_DIR,CMSSW_VERSION,SCRAM_ARCH /opt/cms/entrypoint.sh
          source /opt/cms/entrypoint.sh

          cd /code/CMSSW_10_6_30/src/

          echo "Changing ownership"
          sudo chown -R cmsusr:cmsusr /code/CMSSW_10_6_30
          echo "Now in" $(pwd)

          mkdir -p Simulation
          chown -R $USER:$USER Simulation
          cd Simulation
          echo "Creating ED Analyzer"
          mkedanlzr Sim

          scram b
          REPORT_NAME=BTV-{{inputs.parameters.dataName}}GEN-00010_report.xml

          cmsRun -e -j $REPORT_NAME ../config.py || exit $?

    - name: sim-template
      inputs:
        parameters:
          - name: bucket
          - name: dataName

        artifacts:
          - name: GEN-root
            path: /code/CMSSW_10_6_30/src/Simulation/{{inputs.parameters.dataName}}GEN-00010.root # polku missa tiedosto on kontissa
            archive:
              none: {}
            s3:
              endpoint: s3.pub1.infomaniak.cloud
              bucket: "{{inputs.parameters.bucket}}"
              region: us-east-1 # placeholder, To-do
              accessKeySecret:
                name: s3-credentials
                key: S3_ACCESS_KEY_ID
              secretKeySecret:
                name: s3-credentials
                key: S3_SECRET_ACCESS_KEY
              insecure: false
              key: FullSim/{{inputs.parameters.dataName}}/GEN.root # path where it stays in the cloud storage

      outputs:
        artifacts:
          - name: SIM-root
            path: /code/CMSSW_10_6_30/src/Simulation/{{inputs.parameters.dataName}}SIM-00010.root
            archive:
              none: {}
            s3:
              endpoint: s3.pub1.infomaniak.cloud
              bucket: "{{inputs.parameters.bucket}}"
              region: us-east-1 # placeholder, To-do
              accessKeySecret:
                name: s3-credentials
                key: S3_ACCESS_KEY_ID
              secretKeySecret:
                name: s3-credentials
                key: S3_SECRET_ACCESS_KEY
              insecure: false
              key: FullSim/{{inputs.parameters.dataName}}/SIM.root # path where it stays in the cloud storage
      script:
        image: gitlab-registry.cern.ch/cms-cloud/cmssw-docker-opendata/cmssw_10_6_30-slc7_amd64_gcc700
        command: [bash]
        source: |
          # Init first with sudo and then cmsusr
          echo "Initializing cmsenv"
          sudo --preserve-env=CMS_INSTALL_DIR,CMSSW_VERSION,SCRAM_ARCH /opt/cms/entrypoint.sh
          source /opt/cms/entrypoint.sh

          cd /code/CMSSW_10_6_30/src/Simulation

          echo "Changing ownership"
          sudo chown -R cmsusr:cmsusr /code/CMSSW_10_6_30
          echo "Now in" $(pwd)

          PYTHON_FILENAME={{inputs.parameters.dataName}}SIM-00010_1_cfg.py
          OUTPUT_FILE={{inputs.parameters.dataName}}SIM-00010.root
          INPUT_FILE={{inputs.parameters.dataName}}GEN-00010.root

          cmsDriver.py --python_filename $PYTHON_FILENAME --eventcontent RAWSIM \
          --customise Configuration/DataProcessing/Utils.addMonitoring --datatier GEN-SIM \
          --fileout file:$OUTPUT_FILE --conditions 106X_mcRun2_asymptotic_v13 --beamspot Realistic25ns13TeV2016Collision \
          --step SIM --geometry DB:Extended --filein file:$INPUT_FILE --era Run2_2016 --runUnscheduled --no_exec --mc -n 5

          REPORT_NAME={{inputs.parameters.dataName}}SIM-00010_report.xml
          cmsRun -e -j $REPORT_NAME $PYTHON_FILENAME

    - name: pre-digi2raw-template
      inputs:
        parameters:
          - name: bucket
          - name: dataName

      outputs:
        artifacts:
          - name: pileup_file_list
            path: bucket/pileup_file_list.txt
            archive:
              none: {}
            s3:
              endpoint: s3.pub1.infomaniak.cloud
              bucket: "{{inputs.parameters.bucket}}"
              region: us-east-1 # placeholder, To-do
              accessKeySecret:
                name: s3-credentials
                key: S3_ACCESS_KEY_ID
              secretKeySecret:
                name: s3-credentials
                key: S3_SECRET_ACCESS_KEY
              insecure: false
              key: FullSim/{{inputs.parameters.dataName}}/pileup_file_list.txt # path where it stays in the cloud storage

      script:
        image: cernopendata/cernopendata-client
        command: [bash]
        source: |
          mkdir bucket
          cernopendata-client get-file-locations --recid 30595 --protocol xrootd > bucket/pileup_file_list.txt

    - name: digi2raw-template
      inputs:
        parameters:
          - name: bucket
          - name: dataName
          - name: nPileupFiles # To-do: make handling of nEvents to nPileupFiles
        artifacts:
          - name: pileup_file_list
            path: /code/CMSSW_10_6_30/src/Simulation/pileup_file_list.txt
            archive:
              none: {}
            s3:
              endpoint: s3.pub1.infomaniak.cloud
              bucket: "{{inputs.parameters.bucket}}"
              region: us-east-1 # placeholder, To-do
              accessKeySecret:
                name: s3-credentials
                key: S3_ACCESS_KEY_ID
              secretKeySecret:
                name: s3-credentials
                key: S3_SECRET_ACCESS_KEY
              insecure: false
              key: FullSim/{{inputs.parameters.dataName}}/pileup_file_list.txt # path where it stays in the cloud storage

          - name: SIM-root
            path: /code/CMSSW_10_6_30/src/Simulation/{{inputs.parameters.dataName}}SIM-00010.root
            archive:
              none: {}
            s3:
              endpoint: s3.pub1.infomaniak.cloud
