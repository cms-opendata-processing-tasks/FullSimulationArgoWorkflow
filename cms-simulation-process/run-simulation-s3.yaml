              key: FullSim/{{inputs.parameters.dataName}}/SIM.root # path where it stays in the cloud storage

      outputs:
        artifacts:
          - name: DIGI2RAW-root
            path: /code/CMSSW_10_6_30/src/Simulation/{{inputs.parameters.dataName}}DIGIPremix-00010.root
            archive:
              none: {}
            s3:
              endpoint: s3.pub1.infomaniak.cloud
              bucket: "{{inputs.parameters.bucket}}"
              region: us-east-1 # placeholder, To-do
              accessKeySecret:
                name: s3-credentials
                key: S3_ACCESS_KEY_ID
              secretKeySecret:
                name: s3-credentials
                key: S3_SECRET_ACCESS_KEY
              insecure: false
              key: FullSim/{{inputs.parameters.dataName}}/DIGIPremix.root # path where it stays in the cloud storage
      script:
        image: gitlab-registry.cern.ch/cms-cloud/cmssw-docker-opendata/cmssw_10_6_30-slc7_amd64_gcc700
        command: [bash]
        source: |
          # Init first with sudo and then cmsusr
          echo "Initializing cmsenv"
          sudo --preserve-env=CMS_INSTALL_DIR,CMSSW_VERSION,SCRAM_ARCH /opt/cms/entrypoint.sh
          source /opt/cms/entrypoint.sh

          cd /code/CMSSW_10_6_30/src/Simulation

          echo "Changing ownership"
          sudo chown -R cmsusr:cmsusr /code/CMSSW_10_6_30
          echo "Now in" $(pwd)

          PYTHON_FILENAME={{inputs.parameters.dataName}}DIGIPremix-00010_1_cfg.py
          OUTPUT_FILE={{inputs.parameters.dataName}}DIGIPremix-00010.root
          INPUT_FILE={{inputs.parameters.dataName}}SIM-00010.root

          # To-do: Check how it works with multiple files, now nPileupFiles is always 1 --> affects --pileup_input argument in cmsDriver
          mapfile -n {{inputs.parameters.nPileupFiles}} SELECTED_PILEUP_FILES < pileup_file_list.txt

          cmsDriver.py --python_filename $PYTHON_FILENAME --eventcontent PREMIXRAW \
          --customise Configuration/DataProcessing/Utils.addMonitoring --datatier GEN-SIM-DIGI \
          --fileout file:$OUTPUT_FILE --pileup_input ${SELECTED_PILEUP_FILES[0]} \
          --datamix PreMix --procModifiers premix_stage2 --conditions 106X_mcRun2_asymptotic_v17 --step DIGI,DATAMIX,L1,DIGI2RAW \
          --geometry DB:Extended --filein file:$INPUT_FILE --era Run2_2016 --runUnscheduled --no_exec --mc -n 5

          REPORT_NAME={{inputs.parameters.dataName}}DIGIPremix-00010_report.xml
          cmsRun -e -j $REPORT_NAME $PYTHON_FILENAME

    - name: hlt-template
      inputs:
        parameters:
          - name: bucket
          - name: dataName

        artifacts:
          - name: DIGI2RAW-root
            path: /code/CMSSW_10_6_30/src/Simulation/{{inputs.parameters.dataName}}DIGIPremix-00010.root
            archive:
