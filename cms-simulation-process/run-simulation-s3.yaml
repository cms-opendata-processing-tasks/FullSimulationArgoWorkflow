          OUTPUT_FILE={{inputs.parameters.dataName}}HLT-00010.root
          INPUT_FILE={{inputs.parameters.dataName}}DIGIPremix-00010.root

          cmsDriver.py --python_filename $PYTHON_FILENAME --eventcontent RAWSIM \
          --outputCommand "keep *_mix_*_*,keep *_genPUProtons_*_*" \
          --customise Configuration/DataProcessing/Utils.addMonitoring --datatier GEN-SIM-RAW \
          --inputCommands "keep *","drop *_*_BMTF_*","drop *PixelFEDChannel*_*_*_*" \
          --fileout file:$OUTPUT_FILE --customise_commands 'process.source.bypassVersionCheck = cms.untracked.bool(True)' \
          --step HLT:25ns15e33_v4 --conditions 80X_mcRun2_asymptotic_2016_TrancheIV_v6 \
          --geometry DB:Extended --filein file:$INPUT_FILE --era Run2_2016 --no_exec --mc -n 5

          REPORT_NAME={{inputs.parameters.dataName}}DIGIPremix-00010_report.xml
          cmsRun -e -j $REPORT_NAME $PYTHON_FILENAME

