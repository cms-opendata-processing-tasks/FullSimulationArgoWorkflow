            path: /code/CMSSW_10_6_30/src/Simulation/{{inputs.parameters.dataName}}HLT-00010.root
            archive:
              none: {}
            s3:
              endpoint: s3.pub1.infomaniak.cloud
              bucket: "{{inputs.parameters.bucket}}"
              region: us-east-1 # placeholder, To-do
              accessKeySecret:
                name: s3-credentials
                key: S3_ACCESS_KEY_ID
              secretKeySecret:
                name: s3-credentials
                key: S3_SECRET_ACCESS_KEY
              insecure: false
              key: FullSim/{{inputs.parameters.dataName}}/HLT.root # path where it stays in the cloud storage
      script:
        image: gitlab-registry.cern.ch/cms-cloud/cmssw-docker/cmssw_8_0_33_ul-slc7_amd64_gcc530
        command: [bash]
        source: |
          # Init first with sudo and then cmsusr
          echo "Initializing cmsenv"
          sudo --preserve-env=CMS_INSTALL_DIR,CMSSW_VERSION,SCRAM_ARCH /opt/cms/entrypoint.sh
          source /opt/cms/entrypoint.sh

          cd /code/CMSSW_10_6_30/src/Simulation

