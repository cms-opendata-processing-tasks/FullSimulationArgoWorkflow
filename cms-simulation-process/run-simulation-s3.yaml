apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: simulation-process-
spec:
  entrypoint: cms-full-sim
  serviceAccountName: argo-service-account

  arguments:
    parameters:
      - name: bucket
        value: mirastorage
      - name: dataName
        value: "parallel-testing"
      - name: fragFileName
        value: "fragments.py"
      #- name: nPileupFiles
      #  value: 1
      - name: totEvents
        value: 30
      - name: nJobs
        value: 3
    # to-do: figure out arguments to be more generalized for data-processing, like name of fragment

  templates:
    - name: cms-full-sim # to-do: change name
      inputs:
        parameters:
          - name: bucket
          - name: dataName
          - name: fragFileName
          # - name: nPileupFiles
          - name: totEvents
          - name: nJobs

      dag:
        tasks:
          - name: divide-jobs
            template: divide-jobs-template
            arguments:
              parameters:
                - name: bucket
                  value: "{{inputs.parameters.bucket}}"
                - name: dataName
                  value: "{{inputs.parameters.dataName}}"
                - name: totEvents
                  value: "{{inputs.parameters.totEvents}}"
                #- name: nPileupFiles
                #  value: "{{inputs.parameters.nPileupFiles}}"
                - name: nJobs
                  value: "{{inputs.parameters.nJobs}}"

          - name: gen
            dependencies: [divide-jobs]
            template: gen-template
            arguments:
              parameters:
                - name: bucket
                  value: "{{inputs.parameters.bucket}}"
                - name: dataName
                  value: "{{inputs.parameters.dataName}}"
                - name: fragFileName
                  value: "{{inputs.parameters.fragFileName}}"
                - name: jobIndex
                  value: "{{item.jobIndex}}"
                - name: eventsInJob
                  value: "{{item.eventsinjob}}"
            withParam: "{{tasks.divide-jobs.outputs.result}}"

          - name: sim
            dependencies: [gen]
            template: sim-template
            arguments:
              parameters:
                - name: bucket
                  value: "{{inputs.parameters.bucket}}"
                - name: dataName
                  value: "{{inputs.parameters.dataName}}"
                - name: jobIndex
                  value: "{{item.jobIndex}}"
                #     - name: firstFile
                #       value: "{{item.firstfile}}"
                #     - name: lastFile
                #       value: "{{item.lastfile}}"
                - name: eventsInJob
                  value: "{{item.eventsinjob}}"
            withParam: "{{tasks.divide-jobs.outputs.result}}"

          - name: pre-digi2raw
            dependencies: [sim]
            template: pre-digi2raw-template
            arguments:
              parameters:
                - name: bucket
                  value: "{{inputs.parameters.bucket}}"
                - name: dataName
                  value: "{{inputs.parameters.dataName}}"
                #     - name: firstFile
                #       value: "{{item.firstfile}}"
                #     - name: lastFile
                #       value: "{{item.lastfile}}"

          - name: digi2raw
            dependencies: [pre-digi2raw]
            template: digi2raw-template
            arguments:
              parameters:
                - name: bucket
                  value: "{{inputs.parameters.bucket}}"
                - name: dataName
                  value: "{{inputs.parameters.dataName}}"
                - name: jobIndex
                  value: "{{item.jobIndex}}"
                #     - name: firstFile
                #       value: "{{item.firstfile}}"
                #     - name: lastFile
                #       value: "{{item.lastfile}}"
                - name: eventsInJob
                  value: "{{item.eventsinjob}}"
            withParam: "{{tasks.divide-jobs.outputs.result}}"

          - name: hlt
            dependencies: [digi2raw]
            template: hlt-template
            arguments:
              parameters:
                - name: bucket
                  value: "{{inputs.parameters.bucket}}"
                - name: dataName
                  value: "{{inputs.parameters.dataName}}"
                - name: jobIndex
                  value: "{{item.jobIndex}}"
                #     - name: firstFile
                #       value: "{{item.firstfile}}"
                #     - name: lastFile
                #       value: "{{item.lastfile}}"
                - name: eventsInJob
                  value: "{{item.eventsinjob}}"
            withParam: "{{tasks.divide-jobs.outputs.result}}"

          - name: reco
            dependencies: [hlt]
            template: reco-template
            arguments:
              parameters:
                - name: bucket
                  value: "{{inputs.parameters.bucket}}"
                - name: dataName
                  value: "{{inputs.parameters.dataName}}"
                - name: jobIndex
                  value: "{{item.jobIndex}}"
                #     - name: firstFile
                #       value: "{{item.firstfile}}"
                #     - name: lastFile
                #       value: "{{item.lastfile}}"
                - name: eventsInJob
                  value: "{{item.eventsinjob}}"
            withParam: "{{tasks.divide-jobs.outputs.result}}"

          - name: pat
            dependencies: [reco]
            template: pat-template
            arguments:
              parameters:
                - name: bucket
                  value: "{{inputs.parameters.bucket}}"
                - name: dataName
                  value: "{{inputs.parameters.dataName}}"
                - name: jobIndex
                  value: "{{item.jobIndex}}"
                #     - name: firstFile
                #       value: "{{item.firstfile}}"
                #     - name: lastFile
                #       value: "{{item.lastfile}}"
                - name: eventsInJob
                  value: "{{item.eventsinjob}}"
            withParam: "{{tasks.divide-jobs.outputs.result}}"

          - name: nano
            dependencies: [pat]
            template: nano-template
            arguments:
              parameters:
                - name: bucket
                  value: "{{inputs.parameters.bucket}}"
                - name: dataName
                  value: "{{inputs.parameters.dataName}}"
                - name: jobIndex
                  value: "{{item.jobIndex}}"
                #     - name: firstFile
                #       value: "{{item.firstfile}}"
                #     - name: lastFile
                #       value: "{{item.lastfile}}"
                - name: eventsInJob
                  value: "{{item.eventsinjob}}"
            withParam: "{{tasks.divide-jobs.outputs.result}}"

    - name: divide-jobs-template
      inputs:
        parameters:
          - name: bucket
          - name: dataName
          - name: totEvents
          - name: nJobs
      script:
        image: python:alpine3.6
        command: [python]
        source: |
          import json
          import sys
          def split(a, n):
            k, m = divmod(len(a), n)
            return (a[i*k+min(i, m):(i+1)*k+min(i+1, m)] for i in range(n))
          nJobs = {{inputs.parameters.nJobs}}
          totEvents = {{inputs.parameters.totEvents}}
          modEvents = 0
          eventsInJob = -1
          if totEvents > 0:
            eventsInJob = int(totEvents/nJobs)
            modEvents = totEvents % nJobs
          splits= list(split(range(totEvents),nJobs))
          itlist = [i for i in range(1, nJobs+1)]
          dictlist = []
          for i in itlist:
          #   first = 1+splits[i-1][0]
          #   last = 1+splits[i-1][len(splits[i-1])-1]
            adict = { "jobIndex": i,
          #             "firstfile": first,
          #             "lastfile":  last,
                      "eventsinjob": eventsInJob}
            if i == nJobs:
              adict = { "jobIndex": i,
          #               "firstfile": first,
          #               "lastfile":  last,
                        "eventsinjob": eventsInJob + modEvents}
            dictlist.append(adict)

          # adict = { "jobIndex": 1,
          #           "eventsinjob": eventsInJob}

          json.dump(dictlist, sys.stdout)

    - name: gen-template
      inputs:
        parameters:
          - name: bucket
          - name: dataName
          - name: fragFileName
          - name: jobIndex
          # - name: firstFile
          # - name: lastFile
          - name: eventsInJob

        artifacts:
          - name: GEN-config
            path: /code/CMSSW_10_6_30/src/Configuration/GenProduction/python/fragments.py # path for file in container
            archive:
              none: {}
            s3:
              endpoint: s3.pub1.infomaniak.cloud
              bucket: "{{inputs.parameters.bucket}}"
              region: us-east-1 # placeholder, To-do
              accessKeySecret:
                name: s3-credentials
                key: S3_ACCESS_KEY_ID
              secretKeySecret:
                name: s3-credentials
                key: S3_SECRET_ACCESS_KEY
              insecure: false
              key: FullSim/{{inputs.parameters.dataName}}/{{inputs.parameters.fragFileName}} # path where it stays in the cloud storage

      outputs:
        artifacts:
          - name: GEN-root
            path: /code/CMSSW_10_6_30/src/GEN
            archive:
              none: {}
            s3:
              endpoint: s3.pub1.infomaniak.cloud
              bucket: "{{inputs.parameters.bucket}}"
              region: us-east-1 # placeholder, To-do
              accessKeySecret:
                name: s3-credentials
                key: S3_ACCESS_KEY_ID
              secretKeySecret:
                name: s3-credentials
                key: S3_SECRET_ACCESS_KEY
              insecure: false
              key: FullSim/{{inputs.parameters.dataName}}/GEN # path where it stays in the cloud storage

      script:
        image: gitlab-registry.cern.ch/cms-cloud/cmssw-docker-opendata/cmssw_10_6_30-slc7_amd64_gcc700
        command: [bash]
        source: |
          # write script here

          # Init first with sudo and then cmsusr
          echo "Initializing cmsenv"
          sudo --preserve-env=CMS_INSTALL_DIR,CMSSW_VERSION,SCRAM_ARCH /opt/cms/entrypoint.sh
          source /opt/cms/entrypoint.sh

          cd /code/CMSSW_10_6_30/src/

          echo "Changing ownership"
          sudo chown -R cmsusr:cmsusr /code/CMSSW_10_6_30
          echo "Now in" $(pwd)

          mkdir -p Configuration/GenProduction/python

          echo "Contents of ../Configuration/GenProduction/python"
          echo $(ls ../Configuration/GenProduction/python)

          scram b

          # Make a dir where all the different jobs store the .root output files from this step
          # --> this dir is mounted in the cloud storage

          mkdir GEN

          PYTHON_FILENAME=GEN/GEN_cfg.py
          OUTPUT_FILE=GEN/{{inputs.parameters.jobIndex}}.root
          EVENTS={{inputs.parameters.eventsInJob}}


          cmsDriver.py Configuration/GenProduction/python/fragments.py --python_filename $PYTHON_FILENAME --eventcontent RAWSIM \
          --customise Configuration/DataProcessing/Utils.addMonitoring --datatier GEN --fileout file:$OUTPUT_FILE \
          --conditions 106X_mcRun2_asymptotic_v13 --beamspot Realistic25ns13TeV2016Collision \
          --customise_commands process.source.numberEventsInLuminosityBlock="cms.untracked.uint32(100)" --step GEN \
          --geometry DB:Extended --era Run2_2016 --no_exec --mc -n $EVENTS

          # To-do: find out what to do with the numberEventsInLuminosityBlock ^

          # For now the LHAPDF does not work, comment that line out in the config
          sed -i '/LHAPDF/s/^/#/g' $PYTHON_FILENAME

          # To-do: figure out if reports are necessary and make them jobIndex specific
          REPORT_NAME=GEN/report.xml

          cmsRun -e -j $REPORT_NAME $PYTHON_FILENAME
        #resources:
        #  requests:
        #    cpu: "2"

    - name: sim-template
      inputs:
        parameters:
          - name: bucket
          - name: dataName
          - name: jobIndex
